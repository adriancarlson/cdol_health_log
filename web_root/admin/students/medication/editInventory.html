<form id="med-inv-form" name="inventoryForm">
    <div id="med-inv-wrap" class="fluid-form" ng-controller="editController as vm" ng-cloak>
        <style id="med-inv-styles">
            .fluid-form>div[id$="-row"] {
                margin: 0 0 10px 0;
            }

            .dose-group {
                display: inline-flex;
                align-items: stretch;
                max-width: 100%;
            }

            .dose-input {
                width: 8ch;
                min-width: 8ch;
                max-width: 8ch;
                border-radius: 4px 0 0 4px;
            }

            .inv-input {
                width: 8ch;
                min-width: 8ch;
                max-width: 8ch;
            }

            .inv-qty-edit-wrap {
                display: inline-flex;
                align-items: center;
                gap: 4px;
            }

            .inv-qty-separator {
                display: inline-block;
                min-width: 0.75ch;
                text-align: center;
            }

            #inv-grid {
                margin: 0 !important;
                width: 100%;
                box-sizing: border-box;
            }

            #inv-table-section {
                padding-right: 0 !important;
            }

            .dose-unit {
                width: fit-content;
                min-width: 0;
                margin-left: -1px;
                border-radius: 0 4px 4px 0;
            }
        </style>
        <div id="med-date-row">
            <div id="med-name-group">
                <label id="med-name-label">Medication Name <span id="med-name-req" class="req"><em
                            id="med-name-req-mark">*</em></span></label>
                <input id="med-name-input" type="text" ng-model="vm.medicationRecord.medication_name"
                    ng-change="vm.checkReqFields()">
            </div>
            <div id="date-added-group">
                <label id="date-added-label">Date Added <span id="date-added-req" class="req"><em
                            id="date-added-req-mark">*</em></span> </label>
                <input id="date-added-input" type="text" ng-model="vm.medicationRecord.created_date" pss-date-widget
                    ng-change="vm.checkReqFields()" data-auto-translate="true">
            </div>
        </div>
        <div id="dose-units-row">
            <div id="dose-group">
                <label id="dose-label">Dosage <span id="dose-req" class="req"><em
                            id="dose-req-mark">*</em></span></label>
                <div id="dose-input-group" class="dose-group">
                    <input id="dose-amt-input" type="text" class="dose-input" ng-model="vm.medicationRecord.dose_amount"
                        size="10" maxlength="10" ng-change="vm.checkReqFields()" aria-label="Dosage amount"
                        inputmode="decimal">
                    <select id="dose-unit-select" class="dose-unit"
                        ng-options="key as val for (key,val) in $root.appData.unitList"
                        ng-model="vm.medicationRecord.dose_unit" ng-change="vm.checkReqFields()" aria-label="Dose unit">
                        <option id="dose-unit-placeholder" value=""></option>
                    </select>
                </div>
            </div>
            <div id="inv-unit-group">
                <label id="inv-unit-label">Unit <span id="inv-unit-req" class="req"><em
                            id="inv-unit-req-mark">*</em></span> </label>
                <select id="inv-unit-select" ng-options="key as val for (key,val) in $root.appData.inventoryUnitList"
                    ng-model="vm.medicationRecord.inventory_unit" ng-change="vm.checkReqFields()"
                    aria-label="Inventory unit">
                    <option id="inv-unit-placeholder" value="">Select a Unit</option>
                </select>
            </div>
        </div>
        <div id="route-freq-row">
            <div id="route-group">
                <label id="route-label">Route <span id="route-req" class="req"><em id="route-req-mark">*</em></span>
                </label>
                <select id="route-select" ng-options="val as val for (key,val) in $root.appData.routeList"
                    ng-model="vm.medicationRecord.route" ng-change="vm.checkReqFields()">
                    <option id="route-placeholder" value="">Select a Route</option>
                </select>
            </div>
            <div id="freq-group">
                <label id="freq-label">Frequency <span id="freq-req" class="req"><em id="freq-req-mark">*</em></span>
                </label>
                <select id="freq-select" ng-options="val as val for (key,val) in $root.appData.frequencyList"
                    ng-model="vm.medicationRecord.frequency" ng-change="vm.checkReqFields()">
                    <option id="freq-placeholder" value="">Select a Frequency</option>
                </select>
            </div>
        </div>
        <div id="inv-table-section">
            <label id="start-inv-label">{{vm.isEditMode ? 'Inventory' : 'Starting Inventory'}}
                <span id="start-inv-req" class="req"><em id="start-inv-req-mark">*</em></span> </label>
            <table id="inv-grid" class="grid">
                <thead id="inv-grid-head">
                    <tr id="inv-grid-head-row">
                        <th id="inv-qty-head">Quantity</th>
                        <th id="inv-date-head">Date Added</th>
                        <th id="inv-user-head">Who Added?</th>
                        <th id="inv-notes-head">Inventory Notes</th>
                    </tr>
                </thead>
                <tbody id="inv-grid-body">
                    <tr id="inv-new-row-0">
                        <td id="inv-qty-cell-0" class="center">
                            <span ng-if="!vm.isEditMode">
                                <input id="inv-qty-input-0" class="inv-input" type="text"
                                    ng-model="vm.inventoryRecord[0].quantity_added" size="10" maxlength="10"
                                    ng-change="vm.checkReqFields()" aria-label="Dosage amount" inputmode="decimal">
                            </span>
                            <span ng-if="vm.isEditMode && !vm.inventoryRecord[0]._isExisting">
                                <input id="inv-qty-input-0-edit-new" class="inv-input" type="text"
                                    ng-model="vm.inventoryRecord[0].quantity_added" size="10" maxlength="10"
                                    ng-change="vm.checkReqFields()" aria-label="Quantity added" inputmode="decimal">
                            </span>
                            <span class="inv-qty-edit-wrap" ng-if="vm.isEditMode && vm.inventoryRecord[0]._isExisting">
                                <input id="inv-qty-remaining-input-0" class="inv-input" type="text"
                                    ng-model="vm.inventoryRecord[0].quantity_remaining" size="10" maxlength="10"
                                    ng-change="vm.checkReqFields()" aria-label="Quantity remaining" inputmode="decimal">
                                <span class="inv-qty-separator">/</span>
                                <input id="inv-qty-added-input-0" class="inv-input" type="text"
                                    ng-model="vm.inventoryRecord[0].quantity_added" size="10" maxlength="10"
                                    ng-change="vm.checkReqFields()" aria-label="Quantity added" inputmode="decimal">
                            </span>
                            {{vm.medicationRecord.inventory_unit | pluralize}}
                        </td>
                        <td id="inv-date-cell-0" class="center"><input id="inv-date-input-0" type="text"
                                ng-init="vm.inventoryRecord[0].added_date = vm.inventoryRecord[0].added_date || $root.appData.curDate"
                                ng-model="vm.inventoryRecord[0].added_date" pss-date-widget
                                ng-change="vm.checkReqFields()" data-auto-translate="true"></td>
                        <td id="inv-users-cell-0" class="center">
                            <select id="users-dcid-0"
                                ng-options="staff.dcid as (staff.first_name + ' ' + staff.last_name) for staff in $root.appData.staffList"
                                ng-model="vm.inventoryRecord[0].users_dcid" ng-change="vm.checkReqFields()">
                            </select>
                        </td>
                        <td id="inv-notes-cell-0" class="center"><textarea id="inv-notes-text-0" spellcheck="true"
                                wrap="absolute" rows="3" cols="30" ng-model="vm.inventoryRecord[0].notes"></textarea>
                        </td>
                    </tr>
                    <tr id="inv-new-row-{{$index + 1}}" ng-repeat="inv in vm.additionalInventoryRows track by $index">
                        <td id="inv-qty-cell-{{$index + 1}}" class="center">
                            <span ng-if="!vm.isEditMode">
                                <input id="inv-qty-input-{{$index + 1}}" class="inv-input" type="text"
                                    ng-model="inv.quantity_added" size="10" maxlength="10"
                                    ng-change="vm.checkReqFields()" aria-label="Dosage amount" inputmode="decimal">
                            </span>
                            <span ng-if="vm.isEditMode && !inv._isExisting">
                                <input id="inv-qty-input-edit-new-{{$index + 1}}" class="inv-input" type="text"
                                    ng-model="inv.quantity_added" size="10" maxlength="10"
                                    ng-change="vm.checkReqFields()" aria-label="Quantity added" inputmode="decimal">
                            </span>
                            <span class="inv-qty-edit-wrap" ng-if="vm.isEditMode && inv._isExisting">
                                <input id="inv-qty-remaining-input-{{$index + 1}}" class="inv-input" type="text"
                                    ng-model="inv.quantity_remaining" size="10" maxlength="10"
                                    ng-change="vm.checkReqFields()" aria-label="Quantity remaining" inputmode="decimal">
                                <span class="inv-qty-separator">/</span>
                                <input id="inv-qty-added-input-{{$index + 1}}" class="inv-input" type="text"
                                    ng-model="inv.quantity_added" size="10" maxlength="10"
                                    ng-change="vm.checkReqFields()" aria-label="Quantity added" inputmode="decimal">
                            </span>
                            {{vm.medicationRecord.inventory_unit | pluralize}}
                        </td>
                        <td id="inv-date-cell-{{$index + 1}}" class="center"><input id="inv-date-input-{{$index + 1}}"
                                type="text" ng-init="inv.added_date = inv.added_date || $root.appData.curDate"
                                ng-model="inv.added_date" pss-date-widget ng-change="vm.checkReqFields()"
                                data-auto-translate="true"></td>
                        <td id="inv-users-cell-{{$index + 1}}" class="center">
                            <select id="users-dcid-{{$index + 1}}"
                                ng-options="staff.dcid as (staff.first_name + ' ' + staff.last_name) for staff in $root.appData.staffList"
                                ng-model="inv.users_dcid" ng-change="vm.checkReqFields()">
                            </select>
                        </td>
                        <td id="inv-notes-cell-{{$index + 1}}" class="center"><textarea
                                id="inv-notes-text-{{$index + 1}}" spellcheck="true" wrap="absolute" rows="3" cols="30"
                                ng-model="inv.notes"></textarea>
                        </td>
                    </tr>
                    <tr id="inv-add-row"
                        ng-show="vm.inventoryRecord[0].quantity_added && vm.inventoryRecord[0].added_date && vm.inventoryRecord[0].users_dcid">
                        <td id="inv-add-cell" class="center" colspan="4">
                            <button id="inv-add-btn" type="button" ng-click="vm.addInventoryRecord()">Add Additional
                                Inventory</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
        <div id="notes-row">
            <div id="notes-group">
                <label id="notes-label">Medication Notes:</label>
                <textarea id="notes-text" spellcheck="true" wrap="absolute" rows="5" cols="60"
                    ng-model="vm.medicationRecord.notes"></textarea>
            </div>
        </div>
        <div id="debug-box" class="box-round" ng-if="$root.appData.districtUser && $root.appData.isTestServer">
            <strong id="debug-label">vm.medicationRecord:</strong>
            <br id="debug-break-1">
            <pre id="debug-json-1">{{vm.medicationRecord | json}}</pre>
            <strong id="debug-label">vm.inventoryRecord:
                <pre id="debug-json-2">{{vm.inventoryRecord | json}}</pre>
            </strong>
            <br id="debug-break-2">

        </div>
    </div>
</form>

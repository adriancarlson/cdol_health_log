<form name="inventoryForm">
    <div class="fluid-form" ng-controller="editController as vm" ng-cloak>
        <div>
            <div>
                <label>Medication Name <span class="req"><em>*</em></span></label>
                <input type="text" ng-model="vm.inventoryRecord.medication_name" ng-change="vm.checkReqFields()">
            </div>
            <div>
                <label>Date Added <span class="req"><em>*</em></span> </label>
                <input type="text" ng-model="vm.inventoryRecord.created_date" pss-date-widget
                    ng-change="vm.checkReqFields()" data-auto-translate="true">
            </div>
        </div>
        <div>
            <div>
                <label>Dosage <span class="req"><em>*</em></span></label>
                <input type="text" ng-model="vm.inventoryRecord.dose_amount" size="6" ng-change="vm.checkReqFields()">
                <select ng-options="key as val for (key,val) in $root.appData.unitList"
                    ng-model="vm.inventoryRecord.dose_unit" ng-change="vm.checkReqFields()">
                </select>
            </div>
        </div>
        <div>
            <div>
                <label>Route <span class="req"><em>*</em></span> </label>
                <select ng-options="val as val for (key,val) in $root.appData.routeList"
                    ng-model="vm.inventoryRecord.route" ng-change="vm.checkReqFields()">
                    <option value="">Select a Route</option>
                </select>
            </div>
            <div>
                <label>Frequency <span class="req"><em>*</em></span> </label>
                <select ng-options="val as val for (key,val) in $root.appData.frequencyList"
                    ng-model="vm.inventoryRecord.frequency" ng-change="vm.checkReqFields()">
                    <option value="">Select a Frequency</option>
                </select>
            </div>
        </div>
        <!-- insert inventory  table here -->
        <div>
            <div>
                <label>Notes:</label>
                <textarea spellcheck="true" wrap="absolute" rows="5" cols="60"
                    ng-model="vm.inventoryRecord.notes"></textarea>
            </div>
        </div>
        <div class="box-round" ng-if="$root.appData.districtUser && $root.appData.isTestServer">
            <strong>vm.inventoryRecord:</strong>
            <br>
            <pre>{{vm.inventoryRecord | json}}</pre>
        </div>
    </div>
</form>
